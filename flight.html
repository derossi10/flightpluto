<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - Flights</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --info: #17a2b8;
            --warning: #ffc107;
            --danger: #dc3545;
            --light: #f8f9fa;
            --dark: #343a40;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
        }

        .container-fluid {
            padding: 2rem;
        }

        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .bg-gradient-primary {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        }

        .form-control {
            border-radius: 0.75rem;
            border: 1px solid #e0e0e0;
        }

        .btn {
            border-radius: 0.75rem;
            font-weight: 600;
        }

        .btn-primary { background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); border: none; }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #218838 100%); border: none; }

        .table thead th {
            border-top: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--secondary);
            padding: 1.25rem;
        }

        .table tbody td {
            padding: 1.25rem;
            vertical-align: middle;
        }

        .flight-number {
            font-weight: 700;
            color: var(--primary);
        }

        .airport-code {
            font-weight: 700;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .time-badge {
            font-size: 0.85rem;
            color: var(--secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>

<div class="container-fluid animate-fadeIn">
    <!-- Header/Filter Section -->
    <div class="card">
        <div class="card-header bg-gradient-primary d-flex justify-content-between align-items-center text-white">
            <h5 class="mb-0"><i class="fas fa-plane-departure mr-2"></i>Flight Schedule</h5>
            <div id="filter_notifications"></div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="small font-weight-bold">Airline</label>
                        <select id="filter_airline" class="form-control">
                            <option value="">All Airlines</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="small font-weight-bold">Origin</label>
                        <select id="filter_origin" class="form-control">
                            <option value="">Any Origin</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="small font-weight-bold">Destination</label>
                        <select id="filter_destination" class="form-control">
                            <option value="">Any Destination</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-group w-100">
                        <button class="btn btn-success btn-block" id="btn_add_flight">
                            <i class="fas fa-plus mr-2"></i>Schedule Flight
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Section -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover" id="flights_table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Flight</th>
                            <th>Airline</th>
                            <th>Route</th>
                            <th>Departure</th>
                            <th>Arrival</th>
                            <th>Plane</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="flights_list">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Flight Modal -->
<div class="modal fade" id="flight_modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal_title">Schedule Flight</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-4">
                <div id="modal_notifications"></div>
                <input type="hidden" id="flight_id" value="0">
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Flight Number</label>
                            <input type="text" id="flight_number" class="form-control" placeholder="e.g. EK202">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Airline</label>
                            <select id="flight_airline" class="form-control">
                                <!-- Populated via JS -->
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Plane Model</label>
                            <select id="flight_plane" class="form-control">
                                <!-- Populated via JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="small font-weight-bold">Origin Airport</label>
                            <select id="flight_origin" class="form-control">
                                <!-- Populated via JS -->
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="small font-weight-bold">Destination Airport</label>
                            <select id="flight_destination" class="form-control">
                                <!-- Populated via JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Departure Time</label>
                            <input type="datetime-local" id="flight_departure" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Arrival Time</label>
                            <input type="datetime-local" id="flight_arrival" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Duration (mins)</label>
                            <input type="number" id="flight_duration" class="form-control" placeholder="e.g. 120">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 p-4">
                <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="btn_save_flight">
                    <i class="fas fa-save mr-2"></i>Save Flight
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/flight.js"></script>
</body>
</html>
