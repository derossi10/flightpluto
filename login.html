<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - Login</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area i {
            font-size: 3rem;
            color: var(--primary);
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 1.2rem;
            border: 1px solid #ddd;
        }

        .btn-login {
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 700;
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <i class="fas fa-plane-departure mb-2"></i>
        <h4>FlightPluto</h4>
        <p class="text-muted small">System Login</p>
    </div>

    <div id="login_notifications"></div>

    <form id="login_form">
        <div class="form-group">
            <label class="small font-weight-bold">Username</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-user text-muted"></i></span>
                </div>
                <input type="text" id="username" class="form-control border-left-0" placeholder="Enter username" required>
            </div>
        </div>

        <div class="form-group">
            <label class="small font-weight-bold">Password</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-lock text-muted"></i></span>
                </div>
                <input type="password" id="password" class="form-control border-left-0" placeholder="Enter password" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt mr-2"></i>Access System
        </button>
    </form>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/login.js"></script>
</body>
</html>
