<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - Plane Fleet</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
        }

        .container-fluid { padding: 2rem; }

        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .card-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 1.25rem 1.25rem 0 0 !important;
        }

        .form-control { border-radius: 0.75rem; }

        .btn { border-radius: 0.75rem; font-weight: 600; }

        .table thead th {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--secondary);
            padding: 1.25rem;
        }

        .table tbody td { padding: 1.25rem; vertical-align: middle; }

        .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container-fluid animate-fadeIn">
    <!-- Header/Filter Section -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-tools mr-2"></i>Fleet Management</h5>
            <div id="filter_notifications"></div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="small font-weight-bold">Filter by Airline</label>
                        <select id="filter_airline" class="form-control">
                            <option value="">All Airlines</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="form-group">
                        <label class="small font-weight-bold">Search Model</label>
                        <input type="text" id="filter_plane_model" class="form-control" placeholder="Search aircraft model...">
                    </div>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-group w-100">
                        <button class="btn btn-success btn-block" id="btn_add_plane">
                            <i class="fas fa-plus mr-2"></i>Register Aircraft
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Section -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover" id="planes_table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Aircraft Model</th>
                            <th>Airline</th>
                            <th>Seat Capacity</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="planes_list">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Plane Modal -->
<div class="modal fade" id="plane_modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal_title">Aircraft Details</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-4">
                <div id="modal_notifications"></div>
                <input type="hidden" id="plane_id" value="0">
                
                <div class="form-group">
                    <label class="small font-weight-bold">Operating Airline</label>
                    <select id="plane_airline" class="form-control">
                        <!-- Populated via JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label class="small font-weight-bold">Aircraft Model</label>
                    <input type="text" id="plane_model" class="form-control" placeholder="e.g. Boeing 787 Dreamliner">
                </div>

                <div class="form-group">
                    <label class="small font-weight-bold">Maximum Capacity</label>
                    <input type="number" id="plane_capacity" class="form-control" placeholder="e.g. 250">
                </div>
            </div>
            <div class="modal-footer border-0 p-4">
                <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="btn_save_plane">
                    <i class="fas fa-save mr-2"></i>Save Aircraft
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/security.js"></script>
<script src="assets/js/plane.js"></script>
</body>
</html>
