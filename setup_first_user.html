<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - First User Setup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .btn-create {
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 700;
            background: #007bff;
            color: white;
            border: none;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="setup-card">
    <div class="text-center mb-4">
        <i class="fas fa-user-plus fa-3x text-primary mb-2"></i>
        <h4>Create First Admin User</h4>
        <p class="text-muted small">No users found. Create the first system administrator.</p>
    </div>

    <div id="setup_notifications"></div>

    <form id="setup_form">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label class="small font-weight-bold">First Name</label>
                <input type="text" id="first_name" class="form-control" placeholder="First name" required>
            </div>
            <div class="form-group col-md-6">
                <label class="small font-weight-bold">Last Name</label>
                <input type="text" id="last_name" class="form-control" placeholder="Last name" required>
            </div>
        </div>

        <div class="form-group">
            <label class="small font-weight-bold">Username</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-user text-muted"></i></span>
                </div>
                <input type="text" id="username" class="form-control border-left-0" placeholder="Enter username" required>
            </div>
        </div>

        <div class="form-group">
            <label class="small font-weight-bold">Password</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-lock text-muted"></i></span>
                </div>
                <input type="password" id="password" class="form-control border-left-0" placeholder="Enter password" required>
            </div>
        </div>

        <div class="form-group">
            <label class="small font-weight-bold">Email</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-envelope text-muted"></i></span>
                </div>
                <input type="email" id="email" class="form-control border-left-0" placeholder="Enter email" required>
            </div>
        </div>

        <div class="form-group">
            <label class="small font-weight-bold">Mobile</label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0"><i class="fas fa-phone text-muted"></i></span>
                </div>
                <input type="text" id="mobile" class="form-control border-left-0" placeholder="Enter mobile number">
            </div>
        </div>

        <input type="hidden" id="system_admin" value="1">
        <input type="hidden" id="user_id" value="0">

        <button type="submit" class="btn btn-create">
            <i class="fas fa-user-shield mr-2"></i>Create Admin User
        </button>

        <div class="text-center mt-3">
            <a href="login.html" class="small text-muted">Go to Login</a>
        </div>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(document).ready(function () {
    $('#setup_form').on('submit', function (e) {
        e.preventDefault();

        const notification = $('#setup_notifications');

        $.post('controllers/user_ops.php', {
            saveuser: true,
            user_id: $('#user_id').val(),
            username: $('#username').val(),
            first_name: $('#first_name').val(),
            last_name: $('#last_name').val(),
            password: $('#password').val(),
            email: $('#email').val(),
            mobile: $('#mobile').val(),
            system_admin: $('#system_admin').val()
        }, function (res) {
            if (res.status === 'success') {
                notification.html(`<div class="alert alert-success py-2 small">${res.message} Redirecting to login...</div>`);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
        } else {
                notification.html(`<div class="alert alert-danger py-2 small">${res.message}</div>`);
            }
        }, 'json').fail(function() {
            notification.html(`<div class="alert alert-danger py-2 small">Connection error. Please try again.</div>`);
        });
    });
});
</script>
</body>
</html>
