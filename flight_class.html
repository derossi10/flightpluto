<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - Flight Classes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --info: #17a2b8;
            --danger: #dc3545;
            --light: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.8);
        }
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
        }
        .container-fluid { padding: 2rem; }
        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }
        .bg-gradient-primary { background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); }
        .form-control { border-radius: 0.75rem; border: 1px solid #e0e0e0; padding: 0.6rem 1rem; }
        .btn { border-radius: 0.75rem; padding: 0.6rem 1.2rem; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); border: none; }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #218838 100%); border: none; }
        .table thead th {
            background: rgba(0, 0, 0, 0.02);
            border-top: none;
            border-bottom: 2px solid #eee;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--secondary);
            padding: 1.25rem;
        }
        .table tbody td { padding: 1.25rem; vertical-align: middle; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>
<div class="container-fluid animate-fadeIn">
    <div class="card">
        <div class="card-header bg-gradient-primary d-flex justify-content-between align-items-center text-white">
            <h5 class="mb-0"><i class="fas fa-chair mr-2"></i>Flight Classes</h5>
            <div id="filter_notifications"></div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-9">
                    <div class="form-group">
                        <label class="small font-weight-bold text-uppercase">Search Class</label>
                        <div class="input-group">
                            <input type="text" id="filter_class_name" class="form-control" placeholder="Search by class name...">
                            <div class="input-group-append">
                                <button class="btn btn-primary" id="btn_search_classes">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-success btn-block" id="btn_add_class">
                        <i class="fas fa-plus mr-2"></i>Add Class
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Class Name</th>
                            <th>Description</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="classes_list">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="class_modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal_title">Add Flight Class</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-4">
                <div id="modal_notifications"></div>
                <input type="hidden" id="class_id" value="0">
                <div class="form-group">
                    <label class="small font-weight-bold">Class Name</label>
                    <input type="text" id="class_name" class="form-control" placeholder="e.g. Business Class">
                </div>
                <div class="form-group">
                    <label class="small font-weight-bold">Description</label>
                    <textarea id="class_description" class="form-control" rows="4" placeholder="Class features and benefits..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btn_save_class">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/flight_class.js"></script>
</body>
</html>
