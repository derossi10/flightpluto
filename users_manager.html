<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightPluto - Users Manager</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --info: #17a2b8;
            --warning: #ffc107;
            --danger: #dc3545;
            --light: #f8f9fa;
            --dark: #343a40;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
        }

        .container-fluid {
            padding: 2rem;
        }

        .card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .card-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border-radius: 1.25rem 1.25rem 0 0 !important;
            padding: 1rem 1.5rem;
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 0;
            font-size: 1rem;
        }

        .form-control {
            border-radius: 0.75rem;
            border: 1px solid #e0e0e0;
        }

        .btn {
            border-radius: 0.75rem;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
        }

        .btn-success { background: linear-gradient(135deg, #28a745 0%, #218838 100%); border: none; }
        .btn-danger { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); border: none; }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container-fluid animate-fadeIn">
    <div class="row">
        <!-- Left Side: Existing Users -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">
                    <h6 class="card-title"><i class="fas fa-users mr-2"></i>Existing Users</h6>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="small font-weight-bold">Select User to Manage</label>
                        <select id="existing_users" class="form-control" size="15">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: User Details & Privileges -->
        <div class="col-md-9">
            <!-- User Details Card -->
            <div class="card">
                <div class="card-header">
                    <h6 class="card-title"><i class="fas fa-user-edit mr-2"></i>User Details</h6>
                </div>
                <div class="card-body">
                    <div id="user_notifications"></div>
                    <input type="hidden" id="user_id" value="0">
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">Username</label>
                                <input type="text" id="username" class="form-control" placeholder="e.g. jdoe">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">First Name</label>
                                <input type="text" id="first_name" class="form-control" placeholder="e.g. John">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">Last Name</label>
                                <input type="text" id="last_name" class="form-control" placeholder="e.g. Doe">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">Password</label>
                                <input type="password" id="password" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">Confirm Password</label>
                                <input type="password" id="confirm_password" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="small font-weight-bold">System Administrator</label>
                                <select id="system_admin" class="form-control">
                                    <option value="0">No</option>
                                    <option value="1">Yes</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="small font-weight-bold">Mobile Number</label>
                                <input type="text" id="mobile" class="form-control" placeholder="e.g. +254...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="small font-weight-bold">Email Address</label>
                                <input type="email" id="email" class="form-control" placeholder="e.g. john@example.com">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Privileges Card -->
            <div class="card">
                <div class="card-header bg-info">
                    <h6 class="card-title text-white"><i class="fas fa-key mr-2"></i>User Privileges</h6>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-hover" id="privileges_table">
                            <thead>
                                <tr>
                                    <th>Module Name</th>
                                    <th>Module Code</th>
                                    <th class="text-center">Access Granted</th>
                                </tr>
                            </thead>
                            <tbody id="privileges_list">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-end mb-4">
                <button class="btn btn-danger mr-2" id="btn_clear_fields">
                    <i class="fas fa-trash-alt mr-2"></i>Clear Fields
                </button>
                <button class="btn btn-success" id="btn_save_user">
                    <i class="fas fa-save mr-2"></i>Save User
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/users_manager.js"></script>
</body>
</html>
