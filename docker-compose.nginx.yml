version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: flightpluto_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - flightpluto_network

  php:
    build:
      context: .
      dockerfile: Dockerfile.fpm
    container_name: flightpluto_php
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=mariadb
      - DB_USER=flightpluto_user
      - DB_PASSWORD=flightpluto_pass123
      - DB_NAME=flightpluto
    depends_on:
      - mariadb
    networks:
      - flightpluto_network

  mariadb:
    image: mariadb:10.4
    container_name: flightpluto_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: flightpluto
      MYSQL_USER: flightpluto_user
      MYSQL_PASSWORD: flightpluto_pass123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/flightpluto.sql:/docker-entrypoint-initdb.d/01-flightpluto.sql
      - ./database/security_setup.sql:/docker-entrypoint-initdb.d/02-security_setup.sql
    networks:
      - flightpluto_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mariadb_data:
    driver: local

networks:
  flightpluto_network:
    driver: bridge
